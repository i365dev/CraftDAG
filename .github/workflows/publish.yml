name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          scope: '@i365dev'
          cache: 'pnpm'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build All Packages
        run: pnpm build

      - name: Run Tests
        run: pnpm test

      - name: Pack Packages
        run: |
          mkdir -p artifacts
          cd packages/core
          pnpm pack --pack-destination ../../artifacts
          cd ../exporter-schem
          pnpm pack --pack-destination ../../artifacts
          cd ../importer-schem
          pnpm pack --pack-destination ../../artifacts

      - name: Publish @i365dev/craftdag-core
        run: |
          TGZ=$(ls ./artifacts/i365dev-craftdag-core-*.tgz | head -1)
          VERSION=$(node -e "const p=require('./packages/core/package.json');console.log(p.version)")
          npm view @i365dev/craftdag-core@$VERSION version >/dev/null 2>&1 \
            && echo "Version $VERSION already published, skipping" \
            || npm publish "$TGZ" --access public

      - name: Publish @i365dev/craftdag-exporter-schem
        run: |
          TGZ=$(ls ./artifacts/i365dev-craftdag-exporter-schem-*.tgz | head -1)
          VERSION=$(node -e "const p=require('./packages/exporter-schem/package.json');console.log(p.version)")
          npm view @i365dev/craftdag-exporter-schem@$VERSION version >/dev/null 2>&1 \
            && echo "Version $VERSION already published, skipping" \
            || npm publish "$TGZ" --access public

      - name: Publish @i365dev/craftdag-importer-schem
        run: |
          TGZ=$(ls ./artifacts/i365dev-craftdag-importer-schem-*.tgz | head -1)
          VERSION=$(node -e "const p=require('./packages/importer-schem/package.json');console.log(p.version)")
          npm view @i365dev/craftdag-importer-schem@$VERSION version >/dev/null 2>&1 \
            && echo "Version $VERSION already published, skipping" \
            || npm publish "$TGZ" --access public
